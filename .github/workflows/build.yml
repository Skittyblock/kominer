name: Build

on:
  pull_request:
    paths:
      - ".github/workflows/build.yml"
      - "**/*.rs"
      - "flake.lock"
      - "*.nix"
      - "Cargo.toml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: nix build .#all
